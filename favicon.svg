<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0A0A0A"/>
  <g>
    <rect x="4" y="20" width="5" height="8" rx="1.5" fill="#7B3FE4" opacity="0.45"/>
    <rect x="10" y="15" width="5" height="13" rx="1.5" fill="#7B3FE4" opacity="0.65"/>
    <rect x="16" y="10" width="5" height="18" rx="1.5" fill="#7B3FE4" opacity="0.82"/>
    <rect x="22" y="4" width="5" height="24" rx="1.5" fill="#7B3FE4" filter="url(#glow)"/>
  </g>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
